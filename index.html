*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(160deg,#0f2a1a 0%,#1a4a2e 50%,#0d1f12 100%);font-family:Tahoma,sans-serif;color:#e8f0e0;padding-bottom:30px}
.header{background:rgba(0,0,0,0.35);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);padding:16px 18px 12px;border-bottom:1px solid rgba(120,200,100,0.2);position:sticky;top:0;z-index:10}

.mg{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px}
.mc2{background:rgba(0,0,0,0.25);border:1px solid rgba(168,224,99,0.15);border-radius:16px;padding:16px 10px;text-align:center;cursor:pointer;transition:all 0.2s}
.mc2:active{transform:scale(0.96)}
.mi{font-size:28px;margin-bottom:6px}
.mn{font-size:11px;color:#a8e063;font-weight:bold}
.mcc{font-size:10px;color:rgba(168,224,99,0.4);margin-top:2px}
.sec{padding:16px}
label.fl{display:block;font-size:10px;color:#7ec850;letter-spacing:1.5px;text-transform:uppercase;margin:12px 0 4px}
input,select,textarea{width:100%;padding:11px 12px;border-radius:10px;border:1px solid rgba(168,224,99,0.25);background:rgba(255,255,255,0.06);color:#e8f0e0;font-family:Tahoma;font-size:14px;outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:#4a9c2f;background:rgba(255,255,255,0.1)}
select{background:#1a3a20}textarea{min-height:70px;resize:vertical}

.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.bs{width:100%;margin-top:18px;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#4a9c2f,#2d7a1a);color:#fff;font-family:Tahoma;font-size:15px;font-weight:bold;cursor:pointer;letter-spacing:1px;box-shadow:0 4px 20px rgba(74,156,47,0.3)}

.bb{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid rgba(168,224,99,0.3);color:#a8e063;border-radius:10px;padding:8px 14px;font-family:Tahoma;font-size:13px;cursor:pointer;margin-bottom:12px}
.cd{background:rgba(255,255,255,0.05);border:1px solid rgba(168,224,99,0.15);border-radius:14px;padding:14px;margin-bottom:10px}

.dv{margin:16px 0 0;font-size:11px;color:rgba(168,224,99,0.4);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid rgba(168,224,99,0.12);padding-bottom:5px}
.cb{margin-top:8px;border:1px solid rgba(168,224,99,0.2);border-radius:12px;padding:12px;background:rgba(0,0,0,0.2)}

.cll{font-size:9px;color:rgba(168,224,99,0.5);text-align:center;letter-spacing:1px;text-transform:uppercase}

.abj{background:rgba(50,130,200,0.18);border:1px solid rgba(50,130,200,0.5);color:#80c8f0}
.aal{background:rgba(220,160,0,0.18);border:1px solid rgba(220,160,0,0.5);color:#f0c840}
.acr{background:rgba(200,50,50,0.2);border:1px solid rgba(200,50,50,0.55);color:#f08080}
.sv{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:bold}
.s0{background:rgba(74,156,47,0.2);color:#7ed860}.s1{background:rgba(50,130,200,0.2);color:#80c8f0}

.login-screen{position:fixed;top:0;right:0;bottom:0;left:0;background:linear-gradient(160deg,#0f2a1a,#1a4a2e,#0d1f12);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

.toggle-on{background:rgba(74,156,47,0.2);color:#7ed860}.toggle-off{background:rgba(200,60,60,0.15);color:#f09090}

.login-screen{-webkit-overflow-scrolling:touch}

.step-box{background:rgba(255,255,255,0.04);border:1px solid rgba(168,224,99,0.12);border-radius:12px;padding:14px;margin-bottom:12px}
.step-num{display:inline-block;width:24px;height:24px;border-radius:50%;background:rgba(74,156,47,0.3);color:#a8e063;text-align:center;line-height:24px;font-size:12px;font-weight:bold;margin-right:8px}
.step-title{color:#a8e063;font-size:13px;font-weight:bold}
.step-desc{color:rgba(255,255,255,0.6);font-size:11px;margin-top:6px;line-height:1.5}
.code-box{background:#0a0a0a;border:1px solid rgba(168,224,99,0.2);border-radius:8px;padding:10px;margin-top:8px;font-family:monospace;font-size:10px;color:#7ed860;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.sync-status{padding:10px;border-radius:10px;text-align:center;margin:12px 0;font-size:12px}
.sync-ok{background:rgba(74,156,47,0.15);border:1px solid rgba(74,156,47,0.3);color:#7ed860}
.sync-err{background:rgba(200,60,60,0.15);border:1px solid rgba(200,60,60,0.3);color:#f08080}

.url-input{font-size:11px!important;font-family:monospace}

.photo-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;border:1px solid rgba(168,224,99,0.15);cursor:pointer;margin-top:4px}

.file-label:active{background:rgba(168,224,99,0.2)}

}

function inConsumo(){
var pid=parseInt(V("c1")),ca=parseFloat(V("c3"));
if(!pid)return TT("Seleccione producto","error");

for(var i=0;i<d.insumos.length;i++){if(d.insumos[i].id===pid){prod=d.insumos[i];break;}}
if(!prod)return TT("Producto no encontrado","error");
if(ca>prod.ca)return TT("Stock insuficiente ("+prod.ca+" "+prod.un+")","error");

var costoConsumo=Math.round(costoUnit*ca*100)/100;
